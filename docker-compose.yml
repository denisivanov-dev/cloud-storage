version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: cloud_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cloud_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./backend/api
    container_name: cloud_api
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cloud
    ports:
      - "8000:8000"

volumes:
  postgres_data: